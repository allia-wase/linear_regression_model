# Render: in the service settings, set Root Directory to Summative/API (monorepo).
# After deploy, GET / must include "deploy_tag" in JSON (see prediction.py).
services:
  - type: web
    name: depression-prediction-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars: []
